openapi: 3.0.3
info:
  title: Enterprise AI Platform API
  version: 1.0.0
  description: HTTP contracts for agent invocation, agent catalog, knowledge bases, memory, governance and evaluations.
servers:
  - url: https://api.enterprise-ai-platform.example.com
    description: Reference production endpoint
  - url: http://localhost:8080
    description: Local development endpoint
security:
  - bearerAuth: []
tags:
  - name: Agent Gateway
  - name: Agent Registry
  - name: Knowledge Service
  - name: Memory Service
  - name: Governance Service
  - name: Evaluation Service
paths:
  /agents/{agentId}/invoke:
    post:
      tags: [Agent Gateway]
      summary: Invoke a published agent
      operationId: invokeAgent
      security:
        - bearerAuth: [agent.invoke]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentInvokeRequest'
            examples:
              ragQuestion:
                value:
                  input: Quais políticas internas falam sobre retenção de dados?
                  channel: ai-portal
                  sessionId: session-123
                  context:
                    businessUnit: compliance
                    locale: pt-BR
                    tenantId: enterprise
      responses:
        '200':
          description: Agent response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentInvokeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /agents:
    get:
      tags: [Agent Registry]
      summary: List registered agents
      operationId: listAgents
      security:
        - bearerAuth: [agent.read]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/AgentStatus'
        - name: owner
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Agents page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentListResponse'
    post:
      tags: [Agent Registry]
      summary: Register a new agent
      operationId: createAgent
      security:
        - bearerAuth: [agent.write]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentRequest'
      responses:
        '201':
          description: Created agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
  /agents/{agentId}:
    get:
      tags: [Agent Registry]
      summary: Get agent metadata
      operationId: getAgent
      security:
        - bearerAuth: [agent.read]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Agent metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '404':
          $ref: '#/components/responses/NotFound'
  /agents/{agentId}/publish:
    post:
      tags: [Governance Service]
      summary: Publish an approved agent version
      operationId: publishAgent
      security:
        - bearerAuth: [governance.approve]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishAgentRequest'
      responses:
        '202':
          description: Publication accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
  /knowledge-bases/{knowledgeBaseId}/documents:
    post:
      tags: [Knowledge Service]
      summary: Ingest a document into a knowledge base
      operationId: ingestDocument
      security:
        - bearerAuth: [knowledge.write]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/KnowledgeBaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestDocumentRequest'
      responses:
        '202':
          description: Ingestion accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestDocumentResponse'
  /knowledge-bases/{knowledgeBaseId}/search:
    post:
      tags: [Knowledge Service]
      summary: Search knowledge using hybrid/vector retrieval
      operationId: searchKnowledge
      security:
        - bearerAuth: [knowledge.read]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/KnowledgeBaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KnowledgeSearchRequest'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeSearchResponse'
  /sessions/{sessionId}/memory:
    get:
      tags: [Memory Service]
      summary: Read session memory
      operationId: getSessionMemory
      security:
        - bearerAuth: [memory.read]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Session memory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionMemory'
    post:
      tags: [Memory Service]
      summary: Append or update session memory
      operationId: updateSessionMemory
      security:
        - bearerAuth: [memory.write]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMemoryRequest'
      responses:
        '200':
          description: Updated memory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionMemory'
  /governance/agents/{agentId}/submit:
    post:
      tags: [Governance Service]
      summary: Submit an agent for governance review
      operationId: submitAgentForApproval
      security:
        - bearerAuth: [governance.submit]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GovernanceSubmissionRequest'
      responses:
        '202':
          description: Submission accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceDecision'
  /governance/agents/{agentId}/approve:
    post:
      tags: [Governance Service]
      summary: Approve an agent version
      operationId: approveAgent
      security:
        - bearerAuth: [governance.approve]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GovernanceDecisionRequest'
      responses:
        '200':
          description: Governance decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceDecision'
  /governance/agents/{agentId}/reject:
    post:
      tags: [Governance Service]
      summary: Reject an agent version
      operationId: rejectAgent
      security:
        - bearerAuth: [governance.approve]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GovernanceDecisionRequest'
      responses:
        '200':
          description: Governance decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceDecision'
  /evaluations:
    post:
      tags: [Evaluation Service]
      summary: Start an evaluation run
      operationId: createEvaluation
      security:
        - bearerAuth: [evaluation.write]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEvaluationRequest'
      responses:
        '202':
          description: Evaluation queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Evaluation'
  /evaluations/{evaluationId}:
    get:
      tags: [Evaluation Service]
      summary: Get evaluation result
      operationId: getEvaluation
      security:
        - bearerAuth: [evaluation.read]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - name: evaluationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Evaluation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Evaluation'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    AgentId:
      name: agentId
      in: path
      required: true
      schema:
        type: string
    KnowledgeBaseId:
      name: knowledgeBaseId
      in: path
      required: true
      schema:
        type: string
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid token
    Forbidden:
      description: Token does not have required scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
    TooManyRequests:
      description: Rate limit exceeded
    InternalError:
      description: Internal platform error
  schemas:
    AgentStatus:
      type: string
      enum: [DRAFT, SUBMITTED, APPROVED, PUBLISHED, RETIRED]
    RiskClassification:
      type: string
      enum: [LOW, MEDIUM, HIGH, CRITICAL]
    Agent:
      type: object
      required: [agentId, name, version, owner, status, riskClassification]
      properties:
        agentId:
          type: string
        name:
          type: string
        description:
          type: string
        version:
          type: string
        owner:
          type: string
        businessUnit:
          type: string
        status:
          $ref: '#/components/schemas/AgentStatus'
        riskClassification:
          $ref: '#/components/schemas/RiskClassification'
        modelPolicy:
          $ref: '#/components/schemas/ModelPolicy'
        allowedTools:
          type: array
          items:
            type: string
        knowledgeBaseIds:
          type: array
          items:
            type: string
    CreateAgentRequest:
      type: object
      required: [name, version, owner, instructions, modelPolicy]
      properties:
        name:
          type: string
        version:
          type: string
        owner:
          type: string
        businessUnit:
          type: string
        instructions:
          type: string
        modelPolicy:
          $ref: '#/components/schemas/ModelPolicy'
        allowedTools:
          type: array
          items:
            type: string
        knowledgeBaseIds:
          type: array
          items:
            type: string
    ModelPolicy:
      type: object
      required: [provider, modelId, maxInputTokens, maxOutputTokens, temperature]
      properties:
        provider:
          type: string
          example: bedrock
        modelId:
          type: string
          example: anthropic.claude-3-5-sonnet
        maxInputTokens:
          type: integer
        maxOutputTokens:
          type: integer
        temperature:
          type: number
          minimum: 0
          maximum: 2
    AgentListResponse:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Agent'
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
    AgentInvokeRequest:
      type: object
      required: [input, channel, sessionId]
      properties:
        input:
          type: string
          minLength: 1
        channel:
          type: string
        sessionId:
          type: string
        context:
          type: object
          additionalProperties: true
    AgentInvokeResponse:
      type: object
      required: [conversationId, messageId, answer, evaluationStatus]
      properties:
        conversationId:
          type: string
        messageId:
          type: string
        answer:
          type: string
        citations:
          type: array
          items:
            $ref: '#/components/schemas/Citation'
        toolCalls:
          type: array
          items:
            $ref: '#/components/schemas/ToolCall'
        tokenUsage:
          $ref: '#/components/schemas/TokenUsage'
        evaluationStatus:
          type: string
          enum: [queued, approved, warning, rejected, skipped]
    Citation:
      type: object
      properties:
        sourceId:
          type: string
        title:
          type: string
        uri:
          type: string
        chunkId:
          type: string
        score:
          type: number
    ToolCall:
      type: object
      properties:
        toolName:
          type: string
        toolVersion:
          type: string
        status:
          type: string
          enum: [SUCCESS, FAILED, BLOCKED]
        latencyMs:
          type: integer
    TokenUsage:
      type: object
      properties:
        inputTokens:
          type: integer
        outputTokens:
          type: integer
        totalCostUsd:
          type: number
    PublishAgentRequest:
      type: object
      required: [approvalId]
      properties:
        approvalId:
          type: string
        releaseNotes:
          type: string
    IngestDocumentRequest:
      type: object
      required: [documentId, sourceSystem, uri, classification]
      properties:
        documentId:
          type: string
        sourceSystem:
          type: string
        uri:
          type: string
        title:
          type: string
        classification:
          type: string
          enum: [PUBLIC, INTERNAL, CONFIDENTIAL, RESTRICTED]
        metadata:
          type: object
          additionalProperties: true
    IngestDocumentResponse:
      type: object
      properties:
        ingestionId:
          type: string
        status:
          type: string
          enum: [QUEUED, INGESTING, INDEXED, FAILED]
    KnowledgeSearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        topK:
          type: integer
          default: 5
        filters:
          type: object
          additionalProperties: true
    KnowledgeSearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/Citation'
    SessionMemory:
      type: object
      properties:
        sessionId:
          type: string
        facts:
          type: array
          items:
            type: object
            additionalProperties: true
        preferences:
          type: object
          additionalProperties: true
        updatedAt:
          type: string
          format: date-time
    UpdateMemoryRequest:
      type: object
      properties:
        facts:
          type: array
          items:
            type: object
            additionalProperties: true
        preferences:
          type: object
          additionalProperties: true
    GovernanceSubmissionRequest:
      type: object
      required: [agentVersion, riskClassification, evidence]
      properties:
        agentVersion:
          type: string
        riskClassification:
          $ref: '#/components/schemas/RiskClassification'
        evidence:
          type: array
          items:
            type: string
        notes:
          type: string
    GovernanceDecisionRequest:
      type: object
      required: [decision, reason]
      properties:
        decision:
          type: string
          enum: [APPROVED, REJECTED]
        reason:
          type: string
        conditions:
          type: array
          items:
            type: string
    GovernanceDecision:
      type: object
      properties:
        approvalId:
          type: string
        agentId:
          type: string
        decision:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
        riskClassification:
          $ref: '#/components/schemas/RiskClassification'
        decidedBy:
          type: string
        decidedAt:
          type: string
          format: date-time
    CreateEvaluationRequest:
      type: object
      required: [agentId, datasetId, evaluationType]
      properties:
        agentId:
          type: string
        datasetId:
          type: string
        evaluationType:
          type: string
          enum: [REGRESSION, SAFETY, GROUNDEDNESS, LATENCY, COST]
        baselineVersion:
          type: string
    Evaluation:
      type: object
      properties:
        evaluationId:
          type: string
        agentId:
          type: string
        status:
          type: string
          enum: [QUEUED, RUNNING, APPROVED, WARNING, REJECTED, FAILED]
        metrics:
          type: object
          properties:
            groundedness:
              type: number
            relevance:
              type: number
            hallucinationRisk:
              type: number
            toxicity:
              type: number
            p95LatencyMs:
              type: integer
            estimatedCostUsd:
              type: number
    ErrorResponse:
      type: object
      required: [code, message, correlationId]
      properties:
        code:
          type: string
        message:
          type: string
        correlationId:
          type: string
        details:
          type: array
          items:
            type: string