<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Enterprise AI Platform Reference Architecture</title>
  <desc id="desc">Visão resumida da plataforma corporativa de IA, incluindo governança, runtime, conhecimento, modelos e observabilidade.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#172554"/>
      <stop offset="55%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="675" rx="30" fill="url(#bg)"/>
  <circle cx="1080" cy="90" r="180" fill="#ffffff" opacity="0.05"/>
  <circle cx="90" cy="620" r="220" fill="#ffffff" opacity="0.04"/>

  <text x="70" y="95" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700">Enterprise AI Platform</text>
  <text x="70" y="140" fill="#dbeafe" font-family="Arial, Helvetica, sans-serif" font-size="25">Reference Architecture • Governance • Operations</text>

  <g filter="url(#shadow)">
    <rect x="70" y="200" width="260" height="115" rx="18" fill="#ffffff" opacity="0.96"/>
    <text x="200" y="245" text-anchor="middle" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Control Plane</text>
    <text x="200" y="280" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">Governança • Registry • Policies</text>

    <rect x="470" y="200" width="260" height="115" rx="18" fill="#ffffff" opacity="0.96"/>
    <text x="600" y="245" text-anchor="middle" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Agent Runtime</text>
    <text x="600" y="280" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">Gateway • Orchestration • MCP</text>

    <rect x="870" y="200" width="260" height="115" rx="18" fill="#ffffff" opacity="0.96"/>
    <text x="1000" y="245" text-anchor="middle" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">AI Services</text>
    <text x="1000" y="280" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">Models • Knowledge • Memory</text>

    <rect x="270" y="410" width="260" height="115" rx="18" fill="#ffffff" opacity="0.96"/>
    <text x="400" y="455" text-anchor="middle" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Security</text>
    <text x="400" y="490" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">Identity • Guardrails • Risk</text>

    <rect x="670" y="410" width="260" height="115" rx="18" fill="#ffffff" opacity="0.96"/>
    <text x="800" y="455" text-anchor="middle" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Observability</text>
    <text x="800" y="490" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">Tracing • Logs • Metrics • SLOs</text>
  </g>

  <g stroke="#bfdbfe" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M330 258 H470"/>
    <path d="M730 258 H870"/>
    <path d="M600 315 V370 H400 V410"/>
    <path d="M600 370 H800 V410"/>
  </g>

  <g fill="#bfdbfe">
    <polygon points="458,248 478,258 458,268"/>
    <polygon points="858,248 878,258 858,268"/>
    <polygon points="390,398 400,418 410,398"/>
    <polygon points="790,398 800,418 810,398"/>
  </g>

  <rect x="70" y="585" width="1060" height="45" rx="12" fill="#0f172a" opacity="0.35"/>
  <text x="600" y="615" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="19">Clique para assistir ao vídeo de 15 segundos</text>
</svg>