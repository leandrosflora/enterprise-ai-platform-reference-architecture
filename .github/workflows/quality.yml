name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  contracts-and-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - name: Install validation dependencies
        run: pip install pyyaml mkdocs-material
      - name: Validate canonical contracts
        run: python scripts/validate_contracts.py
      - name: Validate documentation integrity
        run: python scripts/validate_docs.py
      - name: Lint OpenAPI and AsyncAPI
        run: |
          npm install --global @stoplight/spectral-cli
          spectral lint -r .spectral.yaml docs/contracts/openapi.yaml
          spectral lint -r .spectral-asyncapi.yaml docs/contracts/async-api.yaml
      - name: Check PlantUML
        run: ./scripts/render_diagrams.sh
      - name: Build documentation
        run: mkdocs build --strict
      - name: Check external links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --exclude-path .git --exclude 'localhost' './**/*.md'
          fail: true

  vertical-slice:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - name: Install demo dependencies
        run: pip install -r samples/vertical-slice/app/requirements.txt
      - name: Compile Python
        run: python -m compileall -q samples/vertical-slice/app
      - name: Run tests
        env:
          PYTHONPATH: samples/vertical-slice
        run: pytest -q samples/vertical-slice/tests
      - name: Validate compose
        run: docker compose -f samples/vertical-slice/docker-compose.yml config --quiet
      - name: Build demo image
        run: docker build -t enterprise-ai-platform-demo:test samples/vertical-slice/app
