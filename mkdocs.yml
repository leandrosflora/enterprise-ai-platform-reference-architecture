site_name: Enterprise AI Platform Reference Architecture
site_description: Referência para desenho, governança, implementação e operação de plataformas corporativas de IA
site_url: https://leandrosflora.github.io/enterprise-ai-platform-reference-architecture/
repo_url: https://github.com/leandrosflora/enterprise-ai-platform-reference-architecture
repo_name: leandrosflora/enterprise-ai-platform-reference-architecture
edit_uri: edit/main/docs/

copyright: Enterprise AI Platform Reference Architecture - Leandro Silva Flora

theme:
  name: material
  language: pt-BR
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Início: index.md
  - Book:
      - Visão geral: book/index.md
      - 1. Por que uma AI Platform?: book/01-why-ai-platform.md
      - 2. Business Outcomes: book/02-business-outcomes.md
      - 3. Capability Map: book/02-capability-map.md
      - 4. Operating Model: book/03-operating-model.md
      - 5. Ciclo de vida de agentes: book/04-agent-lifecycle.md
      - 6. Caso de agente documental: book/05-case-study-document-agent.md
      - 7. Decision Guides: book/06-decision-guides.md
      - 8. Maturidade e roadmap: book/07-adoption-roadmap.md
      - 9. Checklists de produção: book/08-production-checklists.md
      - Glossário: book/glossary.md
  - Arquitetura:
      - Princípios: architecture/principles/principles.md
      - Requisitos não funcionais: architecture/non-functional-requirements.md
      - Control plane e data plane: architecture/control-plane-data-plane.md
      - C4 completo e publicação: architecture/c4-complete.md
      - Trade-off Guides: architecture/trade-off-guides.md
      - Decision Matrix: architecture/ai-decision-matrix.md
      - Model Selection Framework: architecture/model-selection-framework.md
      - Prompt Engineering Guide: architecture/prompt-engineering-guide.md
      - Hallucination Strategies: architecture/hallucination-strategies.md
      - Event Storming: architecture/diagrams/event-storming.md
  - ADRs:
      - Visão geral: adrs/index.md
      - MCP em vez de REST direto: adrs/001-mcp-vs-rest.md
      - Memória persistente: adrs/002-persistent-memory.md
      - Agent Gateway: adrs/003-agent-gateway.md
  - Casos aplicados:
      - IA conversacional para renegociação: case-studies/conversational-ai.md
  - FinOps:
      - FinOps para IA: finops/ai-finops.md
  - Contratos:
      - Convenções de eventos: contracts/events.md
      - APIs: contracts/apis.md
      - MCP: contracts/mcp-contracts.md
      - Data stores: contracts/data-stores.md
  - Governança:
      - Enterprise AI Governance: governance/ai-governance-framework.md
      - Responsible AI: governance/responsible-ai.md
      - Fluxo de aprovação: governance/approval-workflow.md
      - AI Risk Framework: governance/ai-risk-framework.md
      - Evaluation Framework: governance/evaluation-framework.md
      - Catálogo de IA: governance/ai-catalog.md
      - Ciclo de modelos: governance/model-lifecycle.md
  - Segurança:
      - AI Security Architecture: security/ai-security-architecture.md
      - Autenticação: security/authentication.md
      - Autorização: security/authorization.md
      - Segurança de RAG e memória: security/rag-memory-security.md
      - Threat Model: security/threat-model.md
      - LGPD: security/lgpd.md
  - Observabilidade:
      - Tracing e SLOs: observability/tracing.md
      - Dashboards: observability/dashboards.md
  - Serviços:
      - Agent Gateway: services/agent-gateway.md
      - Agent Runtime: services/agent-runtime.md
      - Model Gateway: services/model-gateway.md
      - Knowledge Service: services/knowledge-service.md
      - Memory Service: services/memory-service.md
      - Governance Service: services/governance-service.md
      - Evaluation Service: services/evaluation-service.md
  - Runbooks:
      - Onboarding de agente: runbooks/onboarding-agent.md
      - Onboarding MCP: runbooks/onboarding-mcp.md
      - Troubleshooting: runbooks/troubleshooting-agent-invocation.md
  - Roadmap técnico: roadmap/implementation-roadmap.md
